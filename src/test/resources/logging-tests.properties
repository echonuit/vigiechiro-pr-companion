# Configuration java.util.logging (JUL) appliquee UNIQUEMENT aux tests (#1523 / #1543).
#
# On conserve le comportement JUL par defaut (console, seuil INFO) pour ne rien masquer
# d'utile, mais on COUPE le seul logger JournalisationTache : de nombreux tests de vue
# exercent volontairement les chemins d'echec routes par ExecuteurTache. Ce logger y emet
# alors, par conception (#1538), des enregistrements SEVERE accompagnes de leur stack trace
# (ex. « IllegalStateException: dossier illisible » dans PassageReactivationViewTest). Ces
# traces sont NORMALES en test mais noient le journal de CI d'alertes trompeuses.
#
# En production rien ne change : App et Cli installent leur propre configuration au demarrage
# via ConfigurationJournalisation (ce fichier n'est pointe que par maven-surefire-plugin).
# JournalisationTacheTest reste vert : il force Level.ALL sur sa propre sonde avant d'asserter.

handlers = java.util.logging.ConsoleHandler
.level = INFO
java.util.logging.ConsoleHandler.level = INFO

fr.univ_amu.iut.commun.view.JournalisationTache.level = OFF
