# Documentation DÉVELOPPEUR de VigieChiro PR Companion.
#
# Site MkDocs **autonome**, volontairement séparé du site utilisateur (mkdocs.yml + docs/) :
# la doc dev vit près du code et pourra rester ici si la doc utilisateur déménage un jour dans
# son propre dépôt. Construit dans `site/dev/` pour être publié sous le sous-chemin `/dev/` du
# même GitHub Pages (cf. .github/workflows/docs.yml).
#
# Build :   mkdocs build -f mkdocs-dev.yml --strict
# Aperçu :  mkdocs serve -f mkdocs-dev.yml
site_name: VigieChiro · Doc développeur
site_description: >-
  Documentation développeur de VigieChiro PR Companion : architecture, conventions,
  et comment contribuer au code.
site_url: https://iutinfoaix-s201.github.io/vigiechiro-pr-companion/dev/
repo_url: https://github.com/IUTInfoAix-S201/vigiechiro-pr-companion
repo_name: IUTInfoAix-S201/vigiechiro-pr-companion
edit_uri: edit/main/dev-docs/
copyright: IUT d'Aix-Marseille - Département Informatique
docs_dir: dev-docs
site_dir: site/dev

theme:
  name: material
  language: fr
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Mode clair
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.action.view
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Vue d'ensemble: index.md
  - Architecture: architecture.md
  - Patterns et principes: patterns.md
  - Navigation et chrome: navigation.md
  - Persistance: persistance.md
  - Modèle de données et domaine: modele-de-donnees.md
  - Glossaire du domaine: glossaire.md
  - Injection (Guice): injection.md
  - Ajouter une fonctionnalité: ajouter-une-fonctionnalite.md
  - Cycle de vie d'un chantier: cycle-de-chantier.md
  - Décisions (ADR):
    - Journal: decisions/index.md
    - 0001 · Réactivation d'un passage reconstruit: decisions/0001-reactivation-passage-reconstruit-identite-structurelle.md
    - 0002 · Détection acoustique de pointe: decisions/0002-detection-acoustique-energie-de-pointe.md
    - 0003 · Feature = plugin désactivable: decisions/0003-feature-plugin-desactivable-ports-optionnels.md
    - 0004 · Cross-feature sans cycle: decisions/0004-cross-feature-sans-cycle-ports-commun.md
    - 0005 · Cascade de preuves, archivé = état observé: decisions/0005-reactivation-cascade-de-preuves-archive-etat-observe.md
    - 0006 · Dépôt par ZIP par défaut: decisions/0006-depot-zip-par-defaut-perte-audio-serveur-assumee.md
    - 0007 · Retours HTTP scellés (ReponseApi): decisions/0007-retours-http-type-scelle-reponse-api.md
    - 0008 · Aucun échec silencieux: decisions/0008-aucun-echec-silencieux-severite-a-l-emission.md
    - 0009 · La nuit comme unité: decisions/0009-la-nuit-est-l-unite-bornee-a-midi.md
    - 0010 · Dialogues bloquants = ports: decisions/0010-dialogues-bloquants-sont-des-ports.md
    - 0011 · Transformation pilotée par le log: decisions/0011-transformation-audio-pilotee-par-le-log.md
    - "0012 · Audit : tout écart visible, un état normal silencieux": decisions/0012-audit-coherence-tout-ecart-visible-etat-normal-silencieux.md
    - 0013 · Ancrage passage ↔ participation: decisions/0013-ancrage-passage-relie-a-sa-participation.md
    - 0014 · Parité CLI ↔ IHM: decisions/0014-parite-cli-ihm.md
    - "0015 · Cartes SD de recette : générateur déterministe": decisions/0015-generateur-deterministe-cartes-sd-recette.md
    - 0016 · Squelettes hydratés à la demande: decisions/0016-synchro-rapatrie-des-squelettes-hydrates-a-la-demande.md
    - 0017 · Origine d'un point (état porté): decisions/0017-origine-d-un-point-etat-porte-pas-deduit.md
    - 0018 · La synchro rapatrie l'identité de la nuit: decisions/0018-la-synchro-rapatrie-l-identite-de-la-nuit.md
    - 0019 · L'ancrage s'acquiert quand il sert: decisions/0019-ancrage-acquis-quand-il-sert.md
  - Recette (acceptation):
    - Méthode: recette/index.md
    - Fixtures (générateur de cartes SD): recette/fixtures.md
    - S1 · Premier contact: recette/sessions/s1-premier-contact.md
    - S2 · Importer une nuit: recette/sessions/s2-importer.md
    - S3 · Vérifier: recette/sessions/s3-verifier.md
    - S4 · Déposer et suivre: recette/sessions/s4-deposer-suivre.md
  - Interface en ligne de commande (CLI): cli.md
  - Tests et qualité: tests-et-qualite.md
  - Contrat de l'API VigieChiro: api-vigiechiro.md
  - Performance et benchmarks: performance.md
  - Observabilité: observabilite.md
  - Captures d'écran: captures.md
  - CI/CD et release: ci-cd-release.md
  - Sécurité et données sensibles: securite.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: fr

extra_css:
  - stylesheets/extra.css
