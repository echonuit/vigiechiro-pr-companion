# Documentation DÉVELOPPEUR de VigieChiro Companion.
#
# Site MkDocs **autonome**, volontairement séparé du site utilisateur (mkdocs.yml + docs/) :
# les deux docs vivent près du code, et chacune est PUBLIÉE dans son propre dépôt, sur son
# propre domaine (publication symétrique) : ce site part dans `echonuit/companion-dev` et sert
# `companion-dev.echonuit.fr`, tandis que la doc utilisateur part dans `echonuit/companion`.
# Construit dans `site-dev/` (plus imbriqué sous le site user) — cf. .github/workflows/docs.yml.
#
# Build :   mkdocs build -f mkdocs-dev.yml --strict
# Aperçu :  mkdocs serve -f mkdocs-dev.yml
site_name: VigieChiro Companion · Doc développeur
site_description: >-
  Documentation développeur de VigieChiro Companion : architecture, conventions,
  et comment contribuer au code.
site_url: https://companion-dev.echonuit.fr/
repo_url: https://github.com/echonuit/vigiechiro-pr-companion
repo_name: echonuit/vigiechiro-pr-companion
edit_uri: edit/main/dev-docs/
copyright: Sébastien Nedjar
docs_dir: dev-docs
site_dir: site-dev

theme:
  name: material
  language: fr
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Mode clair
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.action.view
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Vue d'ensemble: index.md
  - Architecture: architecture.md
  - Patterns et principes: patterns.md
  - Navigation et chrome: navigation.md
  - Persistance: persistance.md
  - Modèle de données et domaine: modele-de-donnees.md
  - Glossaire du domaine: glossaire.md
  - Injection (Guice): injection.md
  - Ajouter une fonctionnalité: ajouter-une-fonctionnalite.md
  - Cycle de vie d'un chantier: cycle-de-chantier.md
