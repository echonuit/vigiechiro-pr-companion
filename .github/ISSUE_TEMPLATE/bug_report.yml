name: 🐛 Problème technique
description: Vous rencontrez une erreur ou un comportement inattendu avec le TP
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Merci de prendre le temps de signaler ce problème ! Plus votre description est précise, plus on peut vous aider vite.

  - type: dropdown
    id: os
    attributes:
      label: Système d'exploitation
      options:
        - Linux (IUT ou perso)
        - macOS
        - Windows
        - GitHub Codespace
    validations:
      required: true

  - type: dropdown
    id: env
    attributes:
      label: Environnement de développement
      options:
        - VS Code
        - IntelliJ IDEA
        - Terminal / ligne de commande seulement
        - Eclipse
        - Autre
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Commande exécutée
      description: La commande qui a déclenché l'erreur (ou ce que vous cliquiez dans l'IDE)
      placeholder: ./mvnw test
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Message d'erreur complet
      description: Copiez-collez le message d'erreur EXACT (pas de capture d'écran)
      render: shell
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: Ce que vous avez déjà essayé
      description: Expliquez brièvement vos tentatives pour résoudre le problème
    validations:
      required: false
