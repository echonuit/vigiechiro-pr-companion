name: 🐛 Signaler un bogue
description: Une erreur ou un comportement inattendu de l'application
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Merci de prendre le temps de signaler ce problème ! Plus votre description est précise, plus on peut le corriger vite.

  - type: dropdown
    id: os
    attributes:
      label: Système d'exploitation
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: dropdown
    id: provenance
    attributes:
      label: Comment lancez-vous l'application ?
      options:
        - Installeur (.msi / .dmg / .deb)
        - Depuis les sources (./mvnw javafx:run)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Numéro de version (page Releases) ou identifiant de commit si vous êtes sur les sources
      placeholder: v1.0.0
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      description: Que faisiez-vous au moment du problème ?
      placeholder: |
        1. Ouvrir l'écran Importation
        2. Sélectionner une carte SD
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu vs observé
      description: Ce que vous attendiez, et ce qui s'est réellement passé
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Message d'erreur (le cas échéant)
      description: Copiez-collez le message d'erreur EXACT (pas de capture d'écran)
      render: shell
    validations:
      required: false
