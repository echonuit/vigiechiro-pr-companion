# Aperçus PNG des vues (.github/assets/apercu-*.png) : vérifiés sur chaque PR, régénérés sur `main`.
#
# Les aperçus servent d'illustrations à la documentation (docs/ecrans/*) : ce workflow les
# régénère automatiquement à partir du code, pour qu'ils ne se désynchronisent jamais des écrans
# réels de l'application.
#
# Le rendu s'exécute AUSSI sur les PR (sans rien committer), et c'est le point : un injecteur de
# capture auquel il manque une liaison Guice ne casse pas la compilation, ne casse aucun test, et
# n'apparaissait donc qu'au run post-merge - sur le dos du push SUIVANT, puisque `cancel-in-progress`
# avait entre-temps annulé le run de la PR fautive. Le rouge atterrissait sur quelqu'un d'autre.
# (Vécu : #1338 ajoute `OuvrirPassage` à `AuditController`, `CaptureAudit` ne le liait pas.)
#
# Rendu hors-écran via la Headless Platform JavaFX 26 (glass.platform=Headless, rendu logiciel sw) :
# aucun display X11 requis. Le commit de mise à jour porte `[skip ci]` pour ne pas se redéclencher
# (et ne déclenche aucune autre CI : un commit d'aperçus n'a pas de code à valider).
name: Aperçus des vues

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  # `checks: write` sert à publier le check `titre` sur la PR d'aperçus : GitHub ne déclenche
  # aucun workflow pour un événement produit avec le GITHUB_TOKEN, donc titre-pr.yml ne peut
  # pas s'exécuter ici. Cf. l'étape « Valider le titre » plus bas.
  checks: write

# Évite que deux régénérations de main (pushes rapprochés) se marchent dessus. Le groupe inclut la
# ref : une PR n'annule jamais le run de `main`, ni celui d'une autre PR.
concurrency:
  group: captures-${{ github.ref }}
  cancel-in-progress: true

jobs:
  capturer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Sur `main`, on se place sur la branche (le job y committera). Sur une PR, checkout par
          # défaut de la tête de la PR : c'est le code qu'on veut rendre.
          ref: ${{ github.event_name == 'push' && 'main' || '' }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          # JavaFX 26 vient des dépendances Maven org.openjfx ; la Headless Platform est 100 %
          # logicielle (aucun runtime natif jdk+fx requis).
          check-latest: false
          cache: maven

      # Sur une PR comme sur `main` : si un écran ne se rend plus, le job échoue ici. C'est le seul
      # endroit qui exerce réellement les injecteurs partiels de capture jusqu'au chargement du FXML.
      - name: Générer les aperçus PNG (hors-écran)
        run: |
          chmod +x .github/assets/capture-screenshots.sh
          .github/assets/capture-screenshots.sh

      - name: Publier les aperçus via une PR auto-mergée
        # Uniquement sur `main` : une PR vérifie que les écrans se rendent, elle ne publie rien.
        if: github.event_name == 'push'
        # `main` impose le passage par une PR et github-actions[bot] ne peut PAS pousser en direct.
        # On modélise donc le workflow PR : branche -> PR -> squash-merge. Le squash porte
        # [skip ci] (anti-récursion : un commit d'aperçus n'a pas de code à valider).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/assets/apercu-*.png
          if git diff --cached --quiet; then
            echo "Aucun aperçu modifié : rien à committer."
            exit 0
          fi
          BRANCH="bot/apercus-${GITHUB_RUN_ID}"
          MSG="chore(captures): mise à jour des aperçus des vues"
          git switch -c "$BRANCH"
          git commit -m "$MSG [skip ci]"
          git push origin "$BRANCH"

          gh pr create --base main --head "$BRANCH" --title "$MSG" \
            --body "Mise à jour automatique de la galerie d'aperçus (.github/assets/apercu-*.png). PR ouverte par le bot car \`main\` impose le passage par une PR ; squash-mergée automatiquement."

          # Valider le titre, et publier le résultat comme check `titre`.
          #
          # `titre` est un check REQUIS (ruleset `titre-de-pr-conforme`), mais titre-pr.yml ne peut
          # pas s'exécuter sur cette PR : GitHub ne déclenche aucun workflow pour un événement
          # produit avec le GITHUB_TOKEN (garde-fou anti-récursion). Un check requis qui ne rapporte
          # jamais bloque la fusion indéfiniment - c'est exactement ce qui est arrivé à la PR #2124.
          #
          # On exécute donc ICI la MÊME validation, avec le MÊME script : seul le transport du
          # résultat change, le contrôle reste réel. Publier un succès en dur reviendrait à faire
          # croire à une vérification qui n'a pas eu lieu.
          chmod +x .github/scripts/verifie-titre-pr.sh
          if ./.github/scripts/verifie-titre-pr.sh "$MSG"; then
            VERDICT=success
            RESUME="Titre conforme à Conventional Commits."
          else
            VERDICT=failure
            RESUME="Titre non conforme : la PR d'aperçus ne sera pas fusionnée."
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/check-runs" \
            -f name=titre \
            -f head_sha="$(git rev-parse HEAD)" \
            -f status=completed \
            -f conclusion="$VERDICT" \
            -f 'output[title]=Titre de PR' \
            -f "output[summary]=${RESUME}" >/dev/null
          echo "Check titre publié : ${VERDICT}"

          # Merge LINÉAIRE (compatible required_linear_history) : squash si autorisé, sinon rebase.
          # Retry : l'état « mergeable » est parfois calculé en asynchrone juste après l'ouverture.
          for i in 1 2 3 4 5; do
            if gh pr merge "$BRANCH" --squash --delete-branch --subject "$MSG [skip ci]" --body "" 2>/dev/null \
               || gh pr merge "$BRANCH" --rebase --delete-branch 2>/dev/null; then
              echo "PR de captures mergée (squash ou rebase selon la configuration)."
              exit 0
            fi
            echo "Merge pas encore possible (tentative $i/5), nouvelle tentative dans 5 s..."
            sleep 5
          done
          echo "::error::Échec du merge de la PR de captures après 5 tentatives."
          exit 1
