# Automatise le board de gestion de projet (GitHub Project v2 de l'equipe) en fonction
# de l'etat des issues et des PR, pour une gestion (presque) transparente cote etudiants.
#
# Comble les transitions absentes des workflows integres du Project v2 :
#   - PR ouverte (non-draft) / prete pour revue / rouverte -> issue liee en "In review"
#   - PR repassee en brouillon                             -> issue liee en "In progress"
#   - nouvelle issue creee                                 -> ajoutee au board (-> Backlog)
# (In progress sur PR liee, Done sur PR mergee / issue fermee : deja geres nativement.)
#
# PREREQUIS : un Project v2 d'organisation n'est PAS modifiable par le GITHUB_TOKEN du
# depot. Il faut un secret (d'organisation) PROJECTS_AUTOMATION_TOKEN = un PAT fin avec
# "Projects: Read and write" sur l'org IUTInfoAix-S201-2026 (+ Issues / Pull requests en
# lecture). Tant que le secret est absent, le job se termine proprement sans rien faire.
#
# Securite : on execute toujours le script depuis la branche par defaut du depot
# (jamais la version d'une PR), donc une PR ne peut pas detourner la logique ni le token.
name: Gestion de projet (board)

on:
  pull_request:
    types: [opened, ready_for_review, converted_to_draft, reopened]
  issues:
    types: [opened]

permissions:
  contents: read

concurrency:
  group: board-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  maj-statut:
    # forks (org -2026) -> runner self-hosted Linux ; canonique/template -> ubuntu
    runs-on: ${{ github.repository_owner == 'IUTInfoAix-S201-2026' && fromJSON('["self-hosted", "Linux", "X64"]') || 'ubuntu-latest' }}
    steps:
      - name: Recuperer le script depuis la branche par defaut
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: Mettre a jour le statut sur le board de l'equipe
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_AUTOMATION_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          ACTION: ${{ github.event.action }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python3 .github/scripts/board_statut.py
