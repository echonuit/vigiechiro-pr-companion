# Documentation MkDocs Material : site UTILISATEUR (docs/) + site DÉVELOPPEUR (dev-docs/, sous /dev/).
#
# - build : construit les deux sites à chaque push/PR touchant la doc (mkdocs build --strict).
#   Toujours actif : valide que la doc compile (liens, nav) sans rien publier.
# - deploy : publie sur GitHub Pages, mais DORMANT tant que la variable de dépôt
#   ENABLE_PAGES != 'true'. À activer quand le dépôt est public et Pages configuré
#   (Settings -> Pages -> Source: GitHub Actions, puis variable ENABLE_PAGES=true).
#   Tant que c'est dormant, aucune étape ne rougit la CI.
# - republication : un déclencheur workflow_run reconstruit et publie le site après
#   chaque régénération des captures, pour que les images en ligne suivent le code.
#
# Note migration : le push se déclenche sur `solution` (branche de travail actuelle)
# et `main` ; à la consolidation des branches, `main` deviendra la seule branche.
name: docs

on:
  push:
    branches: [solution, main]
    # Tout ce qui influe sur le site : pages, config, hook d'exposition des
    # captures, captures elles-mêmes, manifeste et garde-fou.
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "dev-docs/**"
      - "mkdocs-dev.yml"
      - "scripts/mkdocs_hooks.py"
      - ".github/assets/apercu-*.png"
      - ".github/assets/captures.manifest"
      - ".github/assets/check-doc-images.sh"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "dev-docs/**"
      - "mkdocs-dev.yml"
      - "scripts/mkdocs_hooks.py"
      - ".github/assets/apercu-*.png"
      - ".github/assets/captures.manifest"
      - ".github/assets/check-doc-images.sh"
      - ".github/workflows/docs.yml"
  # Republie la doc APRÈS régénération des captures par « Aperçus des vues » :
  # ce workflow commit les PNG en `[skip ci]` (anti-récursion), ce qui bloquerait
  # un déclencheur push mais PAS workflow_run (immunisé au [skip ci]). Sans cela,
  # une capture régénérée serait mergée sans reconstruire le site -> images
  # publiées périmées. (Le nom doit suivre `name:` de capture-vues.yml.)
  # Corollaire : ne JAMAIS écrire ce marqueur de saut dans un message de commit
  # qui modifie la doc, sinon la republication par push est sautée elle aussi.
  workflow_run:
    workflows: ["Aperçus des vues (main)"]
    types: [completed]
  workflow_dispatch: {}

# Permissions minimales par défaut (le job build ne fait que lire le code) ;
# les droits Pages sont accordés au seul job deploy.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Déclenché par « Aperçus des vues » : ne reconstruire que si la régénération
    # des captures a réussi (sinon rien de neuf à publier).
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Installer MkDocs Material
        run: pip install -r docs/requirements.txt
      - name: Garde-fou captures de doc
        run: bash .github/assets/check-doc-images.sh
      - name: Construire le site (strict)
        run: mkdocs build --strict
      # Site DÉVELOPPEUR (config autonome) construit dans site/dev/ -> publié sous /dev/.
      # APRÈS le site user : `mkdocs build` ci-dessus nettoie site/, donc on bâtit le sous-site ensuite.
      - name: Construire le site développeur (strict)
        run: mkdocs build -f mkdocs-dev.yml --strict
      - name: Téléverser l'artefact Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    # Dormant tant que ENABLE_PAGES n'est pas 'true' (et jamais sur une PR).
    if: github.event_name != 'pull_request' && vars.ENABLE_PAGES == 'true'
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.d1.outputs.page_url || steps.d2.outputs.page_url || steps.d3.outputs.page_url }}
    steps:
      # actions/deploy-pages échoue parfois sur une erreur TRANSITOIRE d'infra GitHub
      # (« Deployment failed, try again later »). On retente jusqu'à 3 fois avant
      # d'abandonner, ce qui absorbe ces aléas sans intervention manuelle. Seul le
      # dernier essai peut faire rougir le job (les précédents sont continue-on-error).
      - name: Déployer sur GitHub Pages (essai 1)
        id: d1
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Attente avant réessai
        if: steps.d1.outcome == 'failure'
        run: sleep 20

      - name: Déployer sur GitHub Pages (essai 2)
        id: d2
        if: steps.d1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Attente avant réessai
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        run: sleep 45

      - name: Déployer sur GitHub Pages (essai 3, dernier)
        id: d3
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        uses: actions/deploy-pages@v5
