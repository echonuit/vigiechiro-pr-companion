# Documentation MkDocs Material : site UTILISATEUR (docs/) et site DÉVELOPPEUR (dev-docs/),
# deux sites autonomes publiés SÉPARÉMENT, chacun sur son domaine :
#   docs/      -> echonuit/companion      -> https://companion.echonuit.fr/
#   dev-docs/  -> echonuit/companion-dev  -> https://companion-dev.echonuit.fr/
#
# - construction : les deux sites sont bâtis à chaque push/PR touchant la doc
#   (mkdocs build --strict). Toujours actif : valide que la doc compile (liens, nav).
# - publication : deux pushes vers les dépôts de publication ci-dessus, DORMANTS tant que
#   la variable ENABLE_PAGES != 'true' OU que le secret DOCS_DEPLOY_TOKEN n'est pas posé,
#   et jamais sur une PR. Tant que c'est dormant, aucune étape ne rougit la CI.
#   Les Pages de CE dépôt ne servent plus rien (désactivées) : les URLs de doc ne
#   dépendent donc plus de son nom ni de son organisation.
# - republication : un déclencheur workflow_run reconstruit et publie le site après
#   chaque régénération des captures, pour que les images en ligne suivent le code.
#
# Note migration : le push se déclenche sur `solution` (branche de travail actuelle)
# et `main` ; à la consolidation des branches, `main` deviendra la seule branche.
name: docs

on:
  push:
    branches: [solution, main]
    # Tout ce qui influe sur le site : pages, config, hook d'exposition des
    # captures, captures elles-mêmes, manifeste et garde-fou.
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "dev-docs/**"
      - "mkdocs-dev.yml"
      - "brief/**"
      - "mkdocs-brief.yml"
      - "scripts/mkdocs_hooks.py"
      - ".github/assets/apercu-*.png"
      - ".github/assets/captures.manifest"
      - ".github/assets/check-doc-images.sh"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "dev-docs/**"
      - "mkdocs-dev.yml"
      - "brief/**"
      - "mkdocs-brief.yml"
      - "scripts/mkdocs_hooks.py"
      - ".github/assets/apercu-*.png"
      - ".github/assets/captures.manifest"
      - ".github/assets/check-doc-images.sh"
      - ".github/workflows/docs.yml"
  # Republie la doc APRÈS régénération des captures par « Aperçus des vues » :
  # ce workflow commit les PNG en `[skip ci]` (anti-récursion), ce qui bloquerait
  # un déclencheur push mais PAS workflow_run (immunisé au [skip ci]). Sans cela,
  # une capture régénérée serait mergée sans reconstruire le site -> images
  # publiées périmées. (Le nom doit suivre `name:` de capture-vues.yml.)
  # Corollaire : ne JAMAIS écrire ce marqueur de saut dans un message de commit
  # qui modifie la doc, sinon la republication par push est sautée elle aussi.
  workflow_run:
    workflows: ["Aperçus des vues (main)"]
    types: [completed]
  workflow_dispatch: {}

# Permissions minimales : le job ne fait que LIRE ce dépôt. La publication passe par un PAT
# (DOCS_DEPLOY_TOKEN) vers les dépôts de publication, pas par le GITHUB_TOKEN — aucun droit
# `pages:`/`id-token:` n'est donc nécessaire ici.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Déclenché par « Aperçus des vues » : ne reconstruire que si la régénération
    # des captures a réussi (sinon rien de neuf à publier).
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.x"
      - name: Installer MkDocs Material
        run: pip install -r docs/requirements.txt
      - name: Garde-fou captures de doc
        run: bash .github/assets/check-doc-images.sh
      - name: Construire le site utilisateur (strict)
        run: mkdocs build --strict
      # Site DÉVELOPPEUR (config autonome) construit dans site-dev/, plus imbriqué sous le site
      # user : les deux sites sont désormais publiés SÉPARÉMENT, chacun sur son domaine.
      - name: Construire le site développeur (strict)
        run: mkdocs build -f mkdocs-dev.yml --strict

      # Le brief a rejoint ce dépôt : ses sources vivent sous `brief/`, sa construction
      # et sa publication suivent donc exactement le même chemin que les deux autres
      # sites, au lieu d'un dépôt et d'un workflow séparés à tenir à jour.
      - name: Construire le brief projet (strict)
        run: mkdocs build -f mkdocs-brief.yml --strict

      # Publication SYMÉTRIQUE : chaque site est poussé dans son propre dépôt de publication,
      # qui porte son domaine custom. Conséquences voulues :
      #   - les sources des DEUX docs restent près du code (l'injection des captures par
      #     scripts/mkdocs_hooks.py continue de fonctionner) ;
      #   - le dépôt de code n'est plus lui-même un site (ses Pages sont désactivées), donc les
      #     URLs de doc ne dépendent plus de son nom ni de son organisation.
      # Dormant tant que ENABLE_PAGES n'est pas 'true', et jamais sur une PR (la construction,
      # elle, tourne sur les PR : c'est elle qui valide `--strict`).
      # Garde d'inertie (même patron que winget.yml) : sans le secret, on saute la publication
      # EN VERT au lieu de rougir. Permet de fusionner ce changement avant que le PAT existe ;
      # la publication démarre d'elle-même le jour où il est posé.
      - name: Vérifier la présence du secret DOCS_DEPLOY_TOKEN
        id: garde
        env:
          DOCS_DEPLOY_TOKEN: ${{ secrets.DOCS_DEPLOY_TOKEN }}
        run: |
          if [ -z "$DOCS_DEPLOY_TOKEN" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DOCS_DEPLOY_TOKEN absent : publication des docs ignorée (voir l'en-tête du workflow)."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publier la doc utilisateur (companion.echonuit.fr)
        if: github.event_name != 'pull_request' && vars.ENABLE_PAGES == 'true' && steps.garde.outputs.present == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          external_repository: echonuit/companion
          publish_branch: gh-pages
          publish_dir: ./site
          cname: companion.echonuit.fr
          full_commit_message: "docs(user): publication depuis ${{ github.sha }}"

      - name: Publier la doc développeur (companion-dev.echonuit.fr)
        if: github.event_name != 'pull_request' && vars.ENABLE_PAGES == 'true' && steps.garde.outputs.present == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          external_repository: echonuit/companion-dev
          publish_branch: gh-pages
          publish_dir: ./site-dev
          cname: companion-dev.echonuit.fr

      # `echonuit/brief` portait jusqu'ici ses propres sources ET son propre workflow de
      # publication. Il ne reçoit plus que le site construit, exactement comme les deux
      # dépôts ci-dessus : trois documentations, un seul mécanisme.
      # Le PAT DOCS_DEPLOY_TOKEN doit donc aussi porter `contents:write` sur ce dépôt.
      - name: Publier le brief projet (brief.echonuit.fr)
        if: github.event_name != 'pull_request' && vars.ENABLE_PAGES == 'true' && steps.garde.outputs.present == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          external_repository: echonuit/brief
          publish_branch: gh-pages
          publish_dir: ./site-brief
          cname: brief.echonuit.fr
          full_commit_message: "docs(dev): publication depuis ${{ github.sha }}"
