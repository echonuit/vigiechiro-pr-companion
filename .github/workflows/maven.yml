# Build et tests Maven sur chaque push / PR.
name: Java CI with Maven

on:
  - push
  - pull_request

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          # JDK Zulu standard (sans JavaFX) : JavaFX 26 vient des dépendances
          # Maven org.openjfx. La Headless Platform (glass.platform=Headless)
          # est 100 % logicielle, donc pas besoin du runtime natif jdk+fx.
          cache: maven

      - name: Run tests
        # Tests UI en headless via la Headless Platform JavaFX 26
        # (glass.platform=Headless, cf. pom.xml) : aucun display X11 requis,
        # plus besoin de xvfb.
        run: ./mvnw -B verify --file pom.xml
