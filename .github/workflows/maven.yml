# Build Java : sur chaque PR et sur les pushes vers la branche par défaut.
#
# DEUX jobs parallèles, séparés par ce dont ils dépendent (#2106) :
#
# - `build`  : compilation, suite de tests, seuil de couverture JaCoCo bloquant. C'est la seule
#              exécution des tests en CI ; lint.yml ne fait que l'analyse statique (Spotless,
#              captures, PMD).
# - `paquet` : tout ce qui ne dépend que de l'ASSEMBLAGE du fat-jar - smoke-test, E2E CLI bats,
#              idempotence du packaging. Ces étapes n'ont pas besoin de la suite de tests ni de la
#              couverture, seulement d'un `package`.
#
# Pourquoi les séparer. Elles étaient auparavant quatre étapes à la file dans un seul job, ce qui
# avait deux coûts. Le premier, mesuré sur le run 29728409116 : 449 s de tests + 148 s de bats + 9 s
# d'idempotence en série, soit ~10 min avant le moindre verdict. Le second, plus gênant, est une
# DÉPENDANCE fausse : les étapes de packaging ne s'exécutaient qu'après le succès des tests, donc une
# suite rouge cachait l'état du packaging et on ne l'apprenait qu'au tour suivant. Séparés, les deux
# rendent leur verdict indépendamment, et le chemin critique se ramène au plus long des deux.
#
# Ce qui NE gagne rien à être déplacé : l'installation de bats coûte 9 s, pas plus (vérifié) ; les
# ~140 s du harnais sont les 21 tests eux-mêmes, qui lancent chacun un JVM sur le fat-jar. Inutile
# d'y chercher un cache apt.
#
# `solution` est conservée pendant la transition (avant la consolidation en `main`).
name: Java CI with Maven

on:
  push:
    branches: [solution, main]
  pull_request:
  workflow_dispatch: {}

# Annule un run encore en cours sur la même ref (pushes/PR rapprochés).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          # JDK Temurin standard (sans JavaFX) : JavaFX 26 vient des dépendances Maven
          # org.openjfx. La Headless Platform (glass.platform=Headless) est 100 % logicielle,
          # donc pas besoin du runtime natif jdk+fx.
          check-latest: false
          cache: maven

      - name: Build + tests + couverture (headless)
        # Tests UI en headless via la Headless Platform JavaFX 26 (glass.platform=Headless,
        # cf. pom.xml) : aucun display X11 requis, plus besoin de xvfb.
        # jacoco.haltOnFailure=true rend le seuil de couverture bloquant (85 % lignes,
        # 70 % branches, cf. pom.xml) : les tests ne s'exécutant que dans ce job, le gate de
        # couverture doit vivre ici et non dans lint.yml.
        run: ./mvnw -B verify -Djacoco.haltOnFailure=true --file pom.xml

  paquet:
    name: paquet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          check-latest: false
          cache: maven

      - name: Assembler le fat-jar (sans les tests)
        # `-DskipTests` (et non `-Dmaven.test.skip`) : les tests ne s'EXÉCUTENT pas ici - c'est le
        # travail du job `build` - mais ils se COMPILENT quand même, ce qui garde ce job sensible à
        # une rupture d'API côté test. Le shade est bindé sur `package`, d'où l'absence de `verify`.
        run: ./mvnw -B -DskipTests package --file pom.xml

      - name: Smoke-test du fat-jar (démarrage depuis le jar packagé)
        # Le profil `installer` (jpackage) empaquette ce fat-jar shadé. Les tests unitaires tournent
        # sur le classpath Maven, jamais sur le jar assemblé : ce smoke-test lance le CLI DEPUIS le
        # jar shadé (même jar, entrée headless) pour prouver que l'assemblage démarre (Guice +
        # picocli + services fusionnés + natif SQLite), sans ClassNotFound ni module-info cassé.
        # Détecte les régressions de shade que la compilation ne voit pas.
        run: |
          set -euo pipefail
          jar=$(ls target/vigiechiro-*-shaded.jar | head -1)
          echo "Fat-jar : $jar"
          java --enable-native-access=ALL-UNNAMED -cp "$jar" fr.univ_amu.iut.cli.Cli --help | tee sortie-smoke.txt
          grep -q "Usage: vigiechiro" sortie-smoke.txt

      - name: E2E CLI (bats) sur le fat-jar
        # Tests bout-en-bout au niveau SHELL sur le jar shadé : arguments picocli, codes de sortie et
        # refus métier d'un VRAI processus - ce que les tests Java in-process (CliTest & co.) ne voient
        # pas. Amorce du harnais (#1572, chantier #1565) ; couverture complète cadrée en suite.
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y bats
          export VIGIECHIRO_JAR=$(ls target/vigiechiro-*-shaded.jar | head -1)
          bats src/test/bats

      - name: Idempotence du packaging (2e build sans clean)
        # Le packaging doit être reproductible : un 2e `package` SANS `clean` ne doit pas re-shader le
        # fat-jar. Garde-fou contre une régression de la séparation thin/fat (#1188/#1189) — sans elle,
        # le shade consommait sa propre sortie (`original-*.jar` gonflé, fat-jar qui grossit). On vérifie :
        # taille du fat-jar stable, aucun `original-*.jar`, jar principal resté MINCE.
        run: |
          set -euo pipefail
          fat=$(ls target/vigiechiro-*-shaded.jar | head -1)
          mince=$(ls target/vigiechiro-*.jar | grep -v shaded | head -1)
          avant=$(stat -c%s "$fat")
          ./mvnw -q -B -DskipTests package --file pom.xml
          apres=$(stat -c%s "$fat")
          tailleMince=$(stat -c%s "$mince")
          echo "fat-jar : ${avant} -> ${apres} o | jar mince : ${tailleMince} o"
          test "${avant}" = "${apres}"                          # fat-jar stable (pas de double-shade)
          if ls target/original-*.jar >/dev/null 2>&1; then
            echo "original-*.jar présent : shade a remplacé l'artefact principal !" && exit 1
          fi
          test "${tailleMince}" -lt 6000000                     # le jar principal doit rester mince (< 6 Mo)
