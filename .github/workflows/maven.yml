# Build et tests Maven : sur chaque PR et sur les pushes vers la branche par défaut.
# C'est ici (seule exécution des tests en CI) que le seuil de couverture JaCoCo est
# bloquant ; lint.yml ne fait plus que l'analyse statique (Spotless, captures, PMD).
# `solution` est conservée pendant la transition (avant la consolidation en `main`).
name: Java CI with Maven

on:
  push:
    branches: [solution, main]
  pull_request:
  workflow_dispatch: {}

# Annule un run encore en cours sur la même ref (pushes/PR rapprochés).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          # JDK Temurin standard (sans JavaFX) : JavaFX 26 vient des dépendances Maven
          # org.openjfx. La Headless Platform (glass.platform=Headless) est 100 % logicielle,
          # donc pas besoin du runtime natif jdk+fx.
          check-latest: false
          cache: maven

      - name: Build + tests + couverture (headless)
        # Tests UI en headless via la Headless Platform JavaFX 26 (glass.platform=Headless,
        # cf. pom.xml) : aucun display X11 requis, plus besoin de xvfb.
        # jacoco.haltOnFailure=true rend le seuil de couverture bloquant (85 % lignes,
        # 70 % branches, cf. pom.xml) : les tests ne s'exécutant plus que dans ce job,
        # le gate de couverture doit vivre ici et non dans lint.yml.
        run: ./mvnw -B verify -Djacoco.haltOnFailure=true --file pom.xml

      - name: Smoke-test du fat-jar (démarrage depuis le jar packagé)
        # Le profil `installer` (jpackage) empaquette ce fat-jar shadé. Les tests unitaires
        # tournent sur le classpath Maven, jamais sur le jar assemblé : ce smoke-test lance le
        # CLI DEPUIS le jar shadé (même jar, entrée headless) pour prouver que l'assemblage
        # démarre (Guice + picocli + services fusionnés + natif SQLite), sans ClassNotFound ni
        # module-info cassé. Détecte les régressions de shade que la compilation ne voit pas.
        run: |
          set -euo pipefail
          jar=$(ls target/vigiechiro-*.jar | grep -v original | head -1)
          echo "Fat-jar : $jar"
          java --enable-native-access=ALL-UNNAMED -cp "$jar" fr.univ_amu.iut.cli.Cli --help | tee sortie-smoke.txt
          grep -q "Usage: vigiechiro" sortie-smoke.txt
