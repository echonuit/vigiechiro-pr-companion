# Crée les issues « tâches à faire » dans le dépôt de chaque équipe.
#
# - Garde par nom de dépôt : ne s'exécute que sur les dépôts d'ÉQUIPE
#   `vigiechiro-pr-companion-<EQUIPE>`. Cela exclut d'office le dépôt enseignant
#   (`vigiechiro-pr-companion`, sans suffixe) ET le dépôt template Classroom
#   (`iutinfoaix-s201-2026-…`, autre préfixe) alimenté par le sync.
# - Idempotent PAR TITRE : on ne crée que les tâches dont le titre n'existe pas encore. Donc :
#   le 1er push (population Classroom) crée tout ; un push suivant ne fait rien ; et `workflow_dispatch`
#   (lancement manuel) **complète les tâches manquantes** si un run précédent s'était interrompu en
#   cours (erreur transitoire, limite anti-abus) — sans jamais créer de doublon.
#
# Les tâches sont décrites une par fichier dans `.github/classroom/issues/*.md` (ordre = ordre
# alphabétique des fichiers, d'où les préfixes numériques ; les extensions `e…` viennent en dernier).
# Format d'un fichier : la 1re ligne est le titre (`# Titre`), le reste est le corps de l'issue.
#
# Conservé dans la version étudiante (non retiré au stripping).
name: Bootstrap des tâches (issues)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

# Sérialise les runs d'un même dépôt (un push + un dispatch ne se chevauchent pas) : combiné à
# l'idempotence par titre, garantit l'absence de doublon même en cas de déclenchements rapprochés.
concurrency:
  group: bootstrap-issues-${{ github.repository }}
  cancel-in-progress: false

jobs:
  creer-issues:
    if: startsWith(github.event.repository.name, 'vigiechiro-pr-companion-')
    # forks (org -2026) -> runner self-hosted Linux ; canonique/template -> ubuntu
    runs-on: ${{ github.repository_owner == 'IUTInfoAix-S201-2026' && fromJSON('["self-hosted", "Linux", "X64"]') || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Créer les tâches manquantes (idempotent par titre)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          # Titres des issues déjà présentes (pour ne pas recréer / ne pas dupliquer). Si cette
          # liste échoue (API), on FAIT échouer le job plutôt que de bootstrapper à l'aveugle (sinon
          # risque de doublons) : une relance récupérera proprement. Sur un dépôt neuf, la liste est
          # simplement vide (succès).
          gh issue list --state all --limit 300 --json title --jq '.[].title' > /tmp/titres-existants.txt

          crees=0
          sautes=0
          for f in .github/classroom/issues/*.md; do
            title=$(head -n 1 "$f" | sed 's/^#[[:space:]]*//')
            if grep -Fxq "$title" /tmp/titres-existants.txt; then
              sautes=$((sautes + 1))
              echo "  = déjà présent : $title"
              continue
            fi
            tail -n +2 "$f" > /tmp/corps-issue.md
            gh issue create --title "$title" --body-file /tmp/corps-issue.md
            crees=$((crees + 1))
            echo "  + $title"
            # Petite pause : évite la limite secondaire (anti-abus) de GitHub sur ~54 créations.
            sleep 2
          done
          echo "$crees issue(s) créée(s), $sautes déjà présente(s)."

      - name: Lier les sous-issues aux issues chapeau (idempotent)
        # Transforme chaque tâche « N/M » en sous-issue native de son epic et réécrit la
        # todo-liste de l'epic pour citer les vrais #numéros. Idempotent (re-run = no-op).
        # continue-on-error : le linking est un CONFORT, il ne doit JAMAIS faire échouer le
        # bootstrap étudiant. Si le GITHUB_TOKEN ne peut pas l'API sous-issues, relancer à la
        # main : python3 .github/scripts/link-sub-issues.py --apply --repo <owner/repo>.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/link-sub-issues.py --apply --repo "$GITHUB_REPOSITORY"

      - name: Affecter les milestones MoSCoW + Passe finale (idempotent)
        # Crée les milestones (MUST / SHOULD / COULD / Passe finale, avec échéances) et y
        # rattache les issues selon la priorité du README. Idempotent (re-run = no-op).
        # continue-on-error : confort, ne doit JAMAIS faire échouer le bootstrap étudiant.
        # Relance manuelle : python3 .github/scripts/set-milestones.py --apply --repo <owner/repo>.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/set-milestones.py --apply --repo "$GITHUB_REPOSITORY"
