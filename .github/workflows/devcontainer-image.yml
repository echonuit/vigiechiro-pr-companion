# Build de l'image devcontainer pré-buildée et publication sur GHCR.
#
# Pourquoi : le feature `java` installe le JDK via SDKMAN, dont le service renvoie
# par intermittence des HTTP 504 (typiquement quand 20+ équipes construisent leur
# Codespace en même temps). Résultat : des builds de Codespace qui échouent au
# hasard, qu'un simple « Rebuild Container » ne corrige pas (il retape SDKMAN).
#
# Correctif : on bake les features UNE fois ici (la CI peut, elle, réessayer),
# on publie l'image sur GHCR, et les étudiants ne font plus que *pull* une image
# prête (.devcontainer/devcontainer.json -> "image": ghcr.io/...). Plus aucun
# appel SDKMAN/noVNC au démarrage de leur conteneur.
#
# Recette bakée : .devcontainer/image/devcontainer.json (build ../Dockerfile + features).
# La metadata des features (entrypoint desktop-lite, PATH SDKMAN) est inscrite dans
# le label `devcontainer.metadata` de l'image et réappliquée à la consommation.
name: Build devcontainer image

on:
  push:
    branches: [solution]
    paths:
      - '.devcontainer/Dockerfile'
      - '.devcontainer/image/devcontainer.json'
      - '.github/workflows/devcontainer-image.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    # Ne tourne que sur le repo canonique : les forks étudiants (org Classroom)
    # consomment l'image centrale publique, ils ne la (re)construisent pas.
    if: github.repository == 'IUTInfoAix-S201/vigiechiro-pr-companion'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Étapes shell plutôt que docker/login-action + docker/setup-buildx-action :
      # ces actions JS tournaient sur Node 20 (déprécié au 16/06/2026). Du shell
      # pur n'a pas de runtime Node, donc plus aucun avertissement de version.
      - name: Connexion à GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Préparer un builder Buildx (driver docker-container, requis pour --push)
        run: docker buildx create --name devcontainer-builder --driver docker-container --use

      - name: Installer la CLI devcontainer
        run: npm install -g @devcontainers/cli

      - name: Build + push de l'image (linux/amd64, plateforme Codespaces)
        run: |
          devcontainer build \
            --workspace-folder . \
            --config .devcontainer/image/devcontainer.json \
            --image-name ghcr.io/iutinfoaix-s201/vigiechiro-pr-companion-devcontainer:latest \
            --platform linux/amd64 \
            --push
