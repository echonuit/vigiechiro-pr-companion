# Mise à jour automatique du manifeste Flatpak, après vérification qu'il démarre.
#
# POURQUOI CE WORKFLOW EXISTE
#
# Le manifeste épingle un `.deb` publié : son URL, son empreinte SHA-256 et
# l'entrée <release> du fichier AppStream doivent suivre chaque publication.
# Ces trois faits ont dérivé sur huit versions (#2247) : le manifeste pointait
# une version retirée, et l'AppStream annonçait une version encore plus vieille.
#
# Le manifeste porte pourtant DÉJÀ la description de cette mise à jour, dans son
# bloc `x-checker-data`. C'est le mécanisme officiel de Flathub : leur robot le
# lit et ouvre la mise à jour tout seul. Mais il ne tourne que sur
# l'infrastructure Flathub, contre le manifeste du dépôt Flathub. Tant que le
# paquet n'y est pas accepté (#2191), PERSONNE n'exécute ce bloc.
#
# Ce workflow est donc l'exécutant manquant, et il rend un second service :
# il consomme exactement la même configuration que le robot de Flathub. Si notre
# `x-checker-data` est mal écrit, on l'apprend ici, tout de suite, au lieu de le
# découvrir après acceptation en constatant que le robot officiel ne s'est jamais
# déclenché.
#
# DEUX PARTIS PRIS
#
# 1. `--edit-only` plutôt que de laisser l'outil ouvrir la PR lui-même. On veut
#    CONSTRUIRE et DÉMARRER le Flatpak avant de proposer quoi que ce soit. Une
#    mise à jour automatique qui propose un paquet incapable de démarrer serait
#    pire que pas d'automatisation : elle donnerait l'illusion du contrôle. C'est
#    exactement le piège de #2299, où un paquet mort a été publié parce que la CI
#    vérifiait la présence du lanceur sans jamais l'exécuter.
#
# 2. La vérification a lieu ICI, pas dans un job `pull_request`. Une PR ouverte
#    avec le GITHUB_TOKEN ne déclenche AUCUN autre workflow (garde-fou anti-boucle
#    de GitHub) : la PR arriverait donc sans le moindre check. Reporter la
#    vérification à la PR reviendrait à ne pas vérifier du tout.
#
# 3. La PR est ouverte PUIS fusionnée dans la foulée, comme capture-vues.yml le fait
#    pour la galerie d'aperçus : `main` impose le passage par une PR, la PR n'est donc
#    pas un point de relecture mais le seul transport disponible. Ce qui autorise cette
#    fusion sans regard humain, c'est que le paquet vient d'être construit et DÉMARRÉ :
#    la mise à jour est dérivée d'une release, pas une décision de conception.

name: flatpak

on:
  # DÉCLENCHEMENT MANUEL, comme la soumission winget et pour les mêmes deux raisons.
  #
  # Ce workflow portait `release: released`, qui ne s'est JAMAIS déclenché : la
  # release est dé-brouillonnée par release.yml avec le GITHUB_TOKEN, et GitHub ne
  # déclenche aucun workflow pour un événement produit avec ce jeton. Le vérifier :
  # `gh run list --event release` ne renvoie rien, sur tout l'historique du dépôt.
  #
  # Et le rebrancher aurait coûté cher : ce dépôt publie entre 3 et 37 fois par
  # jour, soit autant de constructions complètes du SDK Flathub et autant de
  # commits de mise à jour sur main, pour un manifeste que personne ne lit encore
  # tant que le paquet n'est pas accepté sur Flathub (#2191).
  #
  # Après acceptation, ce sont de toute façon les robots de Flathub qui prendront
  # le relais des montées de version, toutes les deux heures. Ce workflow restera
  # utile pour ce que ces robots ne font pas : attester que le paquet DÉMARRE.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  # `checks: write` sert à publier le check `titre` sur la PR de mise à jour, pour la
  # même raison qu'en 2. : rien ne se déclenche sur une PR ouverte au GITHUB_TOKEN,
  # donc titre-pr.yml ne peut pas s'y exécuter. Même mécanisme que capture-vues.yml.
  checks: write

jobs:
  mettre-a-jour:
    name: Aligner le manifeste, après l'avoir éprouvé
    runs-on: ubuntu-latest
    env:
      APP_ID: fr.echonuit.VigieChiroCompanion
      MANIFESTE: flatpak/fr.echonuit.VigieChiroCompanion.yml
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      # Met à jour l'URL, l'empreinte et l'entrée <release> AppStream d'après le
      # bloc x-checker-data. `--edit-only` : modifie les fichiers, ne commite pas,
      # n'ouvre pas de PR. La suite du job décide si ça mérite d'être proposé.
      - name: Recalculer le manifeste depuis la dernière release
        uses: docker://ghcr.io/flathub/flatpak-external-data-checker:latest
        with:
          args: --update --edit-only flatpak/fr.echonuit.VigieChiroCompanion.yml

      - name: Y a-t-il quelque chose à proposer ?
        id: diff
        run: |
          set -euo pipefail
          # Le conteneur tourne en root : les fichiers qu'il réécrit lui
          # appartiennent, et la suite du job ne pourrait plus les modifier.
          sudo chown -R "$(id -u):$(id -g)" flatpak/
          if git diff --quiet -- flatpak/; then
            echo "change=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Le manifeste Flatpak est déjà à jour."
          else
            echo "change=true" >> "$GITHUB_OUTPUT"
            git diff --stat -- flatpak/
          fi

      - name: Installer flatpak et son constructeur
        if: steps.diff.outputs.change == 'true'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists --user \
            flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Construire le Flatpak
        if: steps.diff.outputs.change == 'true'
        working-directory: flatpak
        # --disable-rofiles-fuse : le runner n'expose pas FUSE.
        # --install-deps-from : tire la Platform, le SDK et l'extension openjdk.
        # Répertoire de sortie ET répertoire d'état hors du dépôt : par défaut,
        # flatpak-builder écrit `builddir/` et `.flatpak-builder/` dans le dossier
        # courant, soit des centaines de Mo au milieu des sources versionnées. Le
        # premier essai a fini en push rejeté par GitHub (objet de 147 Mo).
        run: |
          set -euo pipefail
          flatpak-builder --disable-rofiles-fuse --install-deps-from=flathub \
            --state-dir="${RUNNER_TEMP}/flatpak-etat" \
            --user --install --force-clean \
            "${RUNNER_TEMP}/flatpak-build" "${APP_ID}.yml"

      - name: Démarrage réel du Flatpak
        if: steps.diff.outputs.change == 'true'
        # Mêmes deux conditions que le job `paquet` de maven.yml : tenir debout ET
        # n'avoir levé aucune erreur de chargement. Une exception sur un fil de
        # fond ne tue pas le processus ; se fier à la seule survie fabriquerait un
        # vert creux. Le code 124 est celui de `timeout` : il signe la survie.
        run: |
          set -euo pipefail
          journal=$(mktemp)
          set +e
          timeout 45 flatpak run --env=JAVA_TOOL_OPTIONS=-Dglass.platform=Headless \
            "$APP_ID" >"$journal" 2>&1
          code=$?
          set -e

          if [ "$code" -ne 124 ]; then
            echo "::error::Le Flatpak s'est arrêté seul (code ${code}) : il ne démarre pas."
            sed -n '1,120p' "$journal"
            exit 1
          fi

          if grep -qE 'NoClassDefFoundError|ClassNotFoundException|Exception in Application start method' "$journal"; then
            echo "::error::Le Flatpak reste en vie mais son démarrage a levé une erreur de chargement."
            sed -n '1,120p' "$journal"
            exit 1
          fi

          echo "Le Flatpak démarre et tient 45 s, sans erreur de chargement."

      - name: Proposer la mise à jour, puis la fusionner
        if: steps.diff.outputs.change == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version=$(sed -n 's|.*/download/v\([^/]*\)/.*|\1|p' "$MANIFESTE" | head -1)
          branche="flatpak/maj-${version}"

          if git ls-remote --exit-code --heads origin "$branche" >/dev/null 2>&1; then
            echo "::notice::La branche ${branche} existe déjà : mise à jour déjà proposée."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branche"
          # Les deux fichiers nommément, jamais `git add flatpak/` : la
          # construction a lieu avant ce pas, et un ajout du dossier entier
          # embarquerait ses artefacts. Ce qu'on propose ici, ce sont exactement
          # les deux fichiers que le vérificateur a réécrits.
          git add flatpak/fr.echonuit.VigieChiroCompanion.yml \
                  flatpak/fr.echonuit.VigieChiroCompanion.metainfo.xml
          git commit \
            -m "build(flatpak): aligner le manifeste sur la v${version}" \
            -m "Mise à jour produite par flatpak-external-data-checker depuis le bloc x-checker-data du manifeste, puis éprouvée : le Flatpak a été construit et démarré (45 s debout, sans erreur de chargement) avant d'être proposé." \
            -m "Refs #2247"
          git push origin "$branche"

          corps=$(mktemp)
          {
            echo "Mise à jour automatique du manifeste Flatpak vers la **v${version}**."
            echo
            echo "Produite par \`flatpak-external-data-checker\` à partir du bloc \`x-checker-data\` du manifeste, c'est-à-dire par le mécanisme même qu'emploiera le robot de Flathub."
            echo
            echo "Le paquet a été **construit et démarré** avant l'ouverture de cette PR : 45 s debout, sans erreur de chargement."
            echo
            echo "La vérification a lieu dans le workflow et non sur cette PR, car une PR ouverte avec le \`GITHUB_TOKEN\` ne déclenche aucun autre workflow. PR ouverte par le bot car \`main\` impose le passage par une PR ; squash-mergée automatiquement."
            echo
            echo "Refs #2247"
          } > "$corps"

          titre="build(flatpak): aligner le manifeste sur la v${version}"
          gh pr create --base main --head "$branche" --title "$titre" --body-file "$corps"

          # Valider le titre et publier le résultat comme check `titre`, exactement
          # comme le fait capture-vues.yml : titre-pr.yml ne peut PAS s'exécuter sur
          # cette PR (aucun workflow n'est déclenché par un événement produit avec le
          # GITHUB_TOKEN), donc sans ce passage elle ne serait validée par rien. On
          # exécute le MÊME script : seul le transport du résultat change. Publier un
          # succès en dur reviendrait à faire croire à une vérification inexistante.
          chmod +x .github/scripts/verifie-titre-pr.sh
          if ./.github/scripts/verifie-titre-pr.sh "$titre"; then
            verdict=success
            resume="Titre conforme à Conventional Commits."
          else
            verdict=failure
            resume="Titre non conforme : la PR de mise à jour ne sera pas fusionnée."
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/check-runs" \
            -f name=titre \
            -f head_sha="$(git rev-parse HEAD)" \
            -f status=completed \
            -f conclusion="$verdict" \
            -f 'output[title]=Titre de PR' \
            -f "output[summary]=${resume}" >/dev/null

          if [ "$verdict" != "success" ]; then
            echo "::error::${resume}"
            exit 1
          fi

          # Merge LINÉAIRE (compatible required_linear_history) : squash si autorisé,
          # sinon rebase. Retry : l'état « mergeable » est parfois calculé en asynchrone
          # juste après l'ouverture. `[skip ci]` sur le sujet du squash : un changement
          # de manifeste Flatpak n'a pas de code à valider sur main, et le paquet vient
          # d'être construit ET démarré quelques pas plus haut.
          for i in 1 2 3 4 5; do
            if gh pr merge "$branche" --squash --delete-branch --subject "$titre [skip ci]" --body "" 2>/dev/null \
               || gh pr merge "$branche" --rebase --delete-branch 2>/dev/null; then
              echo "Mise à jour Flatpak fusionnée."
              exit 0
            fi
            echo "Merge pas encore possible (tentative $i/5), nouvelle tentative dans 5 s..."
            sleep 5
          done
          echo "::error::Échec du merge de la PR de mise à jour Flatpak après 5 tentatives."
          exit 1
