# Portail qualité : formatage + complétude des captures + PMD/JaCoCo bloquants.
# `solution` est conservée pendant la transition (avant la consolidation en `main`).
name: Quality gate

on:
  push:
    branches: [solution, main]
  pull_request:
  workflow_dispatch:

# Annule un run superseded sur la même ref (pushes/PR rapprochés).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          # JDK Temurin standard (sans JavaFX) : JavaFX 26 vient des dépendances Maven
          # org.openjfx. La Headless Platform (glass.platform=Headless) est 100 % logicielle.
          check-latest: false
          cache: maven

      - name: Formatage Spotless (bloquant)
        # Spotless est opt-in (pas de binding Maven) : on l'exécute explicitement ici pour
        # qu'un code non formaté fasse échouer la CI, même sans le hook pre-commit local.
        run: ./mvnw -B spotless:check --file pom.xml

      - name: Complétude des captures de référence
        # Chaque vue FXML doit avoir au moins une capture de référence déclarée au manifeste
        # (les captures illustrent la documentation).
        run: |
          chmod +x .github/assets/check-captures.sh
          ./.github/assets/check-captures.sh

      - name: Portail qualité (PMD + couverture, bloquant)
        # AppTest (TestFX) tourne en headless via la Headless Platform JavaFX 26
        # (glass.platform=Headless) : aucun display X11 requis.
        run: ./mvnw -B -Pquality-gate verify
