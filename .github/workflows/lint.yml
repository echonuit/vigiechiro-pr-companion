# Quality gate strict : cohérence documentaire + PMD failOnViolation.
# Ne tourne QUE sur la branche `solution` (branche enseignant). Sur la
# branche `main` (version étudiante auto-générée), ce workflow est
# absent : `generate-student.sh` supprime le fichier au stripping.
name: Quality gate (solution)

on:
  push:
    branches:
      - solution
  pull_request:
    branches:
      - solution
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    if: github.repository != 'IUTInfoAix-R203/template-tp-java'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # nécessaire pour que le hook / le lint voient
                          # la branche 'solution' et distinguent mode
                          # teacher vs student.

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          # JDK Zulu standard (sans JavaFX) : JavaFX 26 vient des dépendances
          # Maven org.openjfx. La Headless Platform (glass.platform=Headless)
          # est 100 % logicielle, donc pas besoin du runtime natif jdk+fx.
          cache: maven

      - name: Doc coherence linter
        run: |
          chmod +x scripts/lint-doc-coherence.sh
          ./scripts/lint-doc-coherence.sh

      - name: Captures completeness (#86)
        # Chaque vue FXML doit avoir au moins une capture de reference declaree au manifeste.
        run: |
          chmod +x .github/assets/check-captures.sh
          ./.github/assets/check-captures.sh

      - name: Transform unit tests (bats)
        # Vérifie les transformations de generate-student.sh (marqueurs solution/
        # student/fxml/masquer + @Disabled par paquet). Outil enseignant : le
        # dossier scripts/ est stripé de la version étudiante.
        run: |
          sudo apt-get update && sudo apt-get install -y bats
          bats scripts/test/student-transforms.bats

      - name: PMD quality-gate (fail on violation)
        # AppTest (TestFX) tourne en headless via la Headless Platform JavaFX 26
        # (glass.platform=Headless) : aucun display X11 requis, plus besoin de xvfb.
        run: ./mvnw -B -Pquality-gate verify
