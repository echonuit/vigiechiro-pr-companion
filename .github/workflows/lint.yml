# Portail qualité statique : formatage + complétude des captures + PMD bloquant.
# Aucun test ici : la suite complète (et le seuil de couverture JaCoCo bloquant)
# vit dans maven.yml, pour ne pas exécuter les tests deux fois par PR.
# `solution` est conservée pendant la transition (avant la consolidation en `main`).
name: Quality gate

on:
  push:
    branches: [solution, main]
  pull_request:
  workflow_dispatch:

# Annule un run superseded sur la même ref (pushes/PR rapprochés).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          # JDK Temurin standard (sans JavaFX) : JavaFX 26 vient des dépendances Maven
          # org.openjfx. La Headless Platform (glass.platform=Headless) est 100 % logicielle.
          check-latest: false
          cache: maven

      - name: Formatage Spotless (bloquant)
        # Spotless est opt-in (pas de binding Maven) : on l'exécute explicitement ici pour
        # qu'un code non formaté fasse échouer la CI, même sans le hook pre-commit local.
        run: ./mvnw -B spotless:check --file pom.xml

      - name: Complétude des captures de référence
        # Chaque vue FXML doit avoir au moins une capture de référence déclarée au manifeste
        # (les captures illustrent la documentation).
        run: |
          chmod +x .github/assets/check-captures.sh
          ./.github/assets/check-captures.sh

      - name: Enregistrement des outils de capture
        # Chaque outil de capture (classe outils/Capture* avec un main) doit figurer dans le
        # tableau MAINS de capture-screenshots.sh, sinon ses PNG ne seraient jamais régénérés.
        run: |
          chmod +x .github/assets/check-capture-mains.sh
          ./.github/assets/check-capture-mains.sh

      - name: Portail qualité (PMD, bloquant)
        # Analyse statique seule : PMD n'a besoin que des classes compilées (résolution de
        # types), pas des tests. Ne PAS remplacer par `-Pquality-gate verify -DskipTests` :
        # sans jacoco.exec, jacoco:check passe silencieusement au vert au lieu de bloquer.
        # Le seuil de couverture bloquant est appliqué dans maven.yml, là où les tests tournent.
        run: ./mvnw -B -Pquality-gate compile pmd:check

      - name: Cliquets ADR (bloquant)
        # Chaque script `probable` (scripts/adr/NNNN-*.py) rend un code non nul quand le nombre de
        # suspects DÉPASSE le cliquet déclaré dans l'ADR : un cas a été ajouté. C'est ici que le
        # cliquet devient un vrai garde-fou, sur CHAQUE PR.
        #
        # Sans cette étape, le cliquet n'était vérifié que par le rapport hebdomadaire, qui observe
        # sans juger : une régression (un `Alert` de plus hors port, une classe CSS redéfinie)
        # passait donc en silence jusqu'au lundi suivant, et même là ne rougissait pas. La doc et les
        # PR du chantier ADR affirmaient pourtant « le cliquet fait rougir la CI si un cas s'ajoute » ;
        # cette étape rend l'affirmation vraie. python3 est préinstallé sur le runner, les scripts
        # n'ont aucune dépendance hors stdlib.
        run: |
          set -euo pipefail
          echec=0
          for script in scripts/adr/[0-9]*.py; do
            python3 "$script" || echec=1
          done
          exit "$echec"
