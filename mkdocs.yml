site_name: VigieChiro PR Companion
site_description: >-
  Documentation utilisateur de VigieChiro PR Companion, l'application d'aide au traitement
  des nuits de capture acoustique de chauves-souris.
site_url: https://iutinfoaix-s201.github.io/vigiechiro-pr-companion/
repo_url: https://github.com/IUTInfoAix-S201/vigiechiro-pr-companion
repo_name: IUTInfoAix-S201/vigiechiro-pr-companion
edit_uri: edit/main/docs/
copyright: IUT d'Aix-Marseille - Département Informatique
docs_dir: docs
site_dir: site

# Hooks Python (chemins relatifs à ce fichier). Le hook expose les captures
# d'écran régénérées (.github/assets/apercu-*.png) sous assets/captures/.
hooks:
  - scripts/mkdocs_hooks.py

theme:
  name: material
  language: fr
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Mode clair
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.action.view
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Accueil: index.md
  - Prise en main: prise-en-main.md
  - Personnaliser les tableaux: personnaliser-les-tableaux.md
  - Se connecter à Vigie-Chiro: connexion-vigiechiro.md
  - Parcours métier: parcours/index.md
  - Référence par écran:
      - ecrans/index.md
      - Accueil: ecrans/accueil.md
      - Recherche: ecrans/recherche.md
      - Mes sites: ecrans/sites.md
      - Passage: ecrans/passage.md
      - Importation: ecrans/importation.md
      - Qualification: ecrans/qualification.md
      - Préparer le dépôt: ecrans/lot.md
      - "Sons & validation": ecrans/validation.md
      - "Carte & passages": ecrans/multisite.md
      - "Espèces & observations": ecrans/analyse.md
      - Diagnostic: ecrans/diagnostic.md
      - Audit de cohérence: ecrans/audit.md
      - Réglages: ecrans/reglages.md
  - Raccourcis clavier: raccourcis-clavier.md
  - Glossaire: glossaire.md
  - FAQ et dépannage: faq.md

# Extensions alignées sur le brief SAE 2.01 (même rendu).
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  # Mermaid natif Material : les blocs ```mermaid sont rendus côté navigateur.
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: fr

extra_css:
  - stylesheets/extra.css

# Le dossier docs/benchmarks (note technique de perf) et le fichier des
# dépendances ne font pas partie du site utilisateur.
exclude_docs: |
  benchmarks/
  requirements.txt
