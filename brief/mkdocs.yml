site_name: VigieChiro Companion · Brief projet
site_description: >-
  Dossier de conception de VigieChiro Companion : besoin, modèle de données,
  parcours utilisateurs, maquettes et story mapping.
site_url: https://brief.echonuit.fr/
repo_url: https://github.com/echonuit/brief
repo_name: echonuit/brief
edit_uri: edit/main/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: fr
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.action.view
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Mode clair
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: fr

extra_css:
  - stylesheets/extra.css

nav:
  - Accueil: index.md
  - 1. Présentation du projet: Présentation du projet.md
  - 2. Stack technique et architecture: Contraintes techniques.md
  - 3. Objectifs qualités:
      - Vue d'ensemble: Objectifs qualités/index.md
      - Catégories ISO 25010: Objectifs qualités/Catégorie de qualité.md
      - Critères ISO 25010: Objectifs qualités/Critère de qualité.md
      - Objectifs:
          - Vue d'ensemble: Objectifs qualités/Objectifs qualités/index.md
          - O1 - Portabilité multi-OS: Objectifs qualités/Objectifs qualités/O1.md
          - O2 - Facilité d'apprentissage: Objectifs qualités/Objectifs qualités/O2.md
          - O3 - Tenue dans la durée: Objectifs qualités/Objectifs qualités/O3.md
          - O4 - Exactitude lecture audio: Objectifs qualités/Objectifs qualités/O4.md
          - O5 - Capacité CSV: Objectifs qualités/Objectifs qualités/O5.md
          - O6 - Modularité protocoles: Objectifs qualités/Objectifs qualités/O6.md
